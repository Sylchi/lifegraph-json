name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  # Build and test on stable Rust
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
      
      - name: Build
        run: cargo build --verbose
      
      - name: Run tests
        run: cargo test --verbose
      
      - name: Run doc tests
        run: cargo test --doc --verbose

  # Check formatting
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      
      - name: Check formatting
        run: cargo fmt --all --check

  # Run Clippy lints
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
      
      - name: Run Clippy
        run: cargo clippy --lib --tests --examples --all-features -- -D warnings

      - name: Run Clippy (benches, nightly)
        run: |
          rustup toolchain install nightly --component clippy
          cargo +nightly clippy --benches --all-features -- -D warnings

  # Check MSRV (Minimum Supported Rust Version)
  msrv:
    name: MSRV Check
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust (MSRV)
        uses: dtolnay/rust-toolchain@1.70

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Regenerate Cargo.lock for MSRV
        run: cargo generate-lockfile

      - name: Check MSRV build
        run: cargo check --no-default-features --features std

  # Build documentation
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
      
      - name: Check documentation
        env:
          RUSTDOCFLAGS: -Dwarnings
        run: cargo doc --all-features --no-deps

  # Test with different feature combinations
  features:
    name: Features (${{ matrix.features }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        features:
          - "--no-default-features"
          - "--no-default-features --features alloc"
          - "--no-default-features --features std"
          - "--features serde"
          - "--features serde,raw_value"
          - "--features serde,indexmap"
          - "--features serde,schemars"
          - "--features serde,ts-rs"
      fail-fast: false
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
      
      - name: Build with features
        run: cargo build ${{ matrix.features }} --verbose
      
      - name: Test with features
        run: cargo test ${{ matrix.features }} --verbose

  # Serde JSON API Compatibility Report
  compat:
    name: Serde JSON Compatibility
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Generate compatibility report
        run: |
          chmod +x scripts/compat_report.sh
          scripts/compat_report.sh
