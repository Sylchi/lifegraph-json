name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always

jobs:
  # Verify release
  verify:
    name: Verify Release
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
      
      - name: Build release
        run: cargo build --release --verbose
      
      - name: Run all tests
        run: cargo test --release --verbose
      
      - name: Build documentation
        run: cargo doc --all-features --no-deps
      
      - name: Verify package
        run: cargo package --allow-dirty

  # Publish to crates.io
  publish:
    name: Publish to crates.io
    needs: verify
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish

  # Create GitHub release
  github-release:
    name: GitHub Release
    needs: verify
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate release notes
        id: notes
        run: |
          echo "## Release ${{ github.ref_name }}" > release-notes.md
          echo "" >> release-notes.md
          echo "### Changes" >> release-notes.md
          echo "" >> release-notes.md
          git log --oneline $(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)..HEAD --pretty=format:"- %s" >> release-notes.md
          echo "" >> release-notes.md
          echo "### Documentation" >> release-notes.md
          echo "" >> release-notes.md
          echo "See https://docs.rs/lifegraph-json/${{ github.ref_name }} for API documentation." >> release-notes.md
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: release-notes.md
          draft: false
          prerelease: false
          generate_release_notes: true
